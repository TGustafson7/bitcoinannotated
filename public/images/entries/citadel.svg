<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <rect width="800" height="560" fill="#f8f4ed"/>

  <text x="80" y="60" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5">PHRASE — THOUGHT EXPERIMENT</text>
  <text x="720" y="60" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="end">31 AUGUST 2013</text>

  <text x="400" y="200" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="48" fill="#d97706" text-anchor="middle" font-weight="500">the citadel.</text>

  <line x1="320" y1="240" x2="480" y2="240" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="290" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="15" fill="#1a1a1a" text-anchor="middle">"I am sending this message from the year 2025.</text>
  <text x="400" y="312" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="15" fill="#1a1a1a" text-anchor="middle">Things are looking bleak here, and some of you</text>
  <text x="400" y="334" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="15" fill="#1a1a1a" text-anchor="middle">will carry blood on your hands."</text>

  <line x1="280" y1="380" x2="520" y2="380" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="420" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="middle">SOURCE: REDDIT R/BITCOIN, USER LUKA_MAGNOTTA</text>
  <text x="400" y="445" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="middle">USAGE: BITCOIN'S LONGEST-RUNNING THOUGHT EXPERIMENT</text>

  <text x="80" y="530" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5">BITCOIN ANNOTATED</text>
  <text x="720" y="530" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5" text-anchor="end">PLATE XII</text>
</svg>
