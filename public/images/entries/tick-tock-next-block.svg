<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f8f4ed"/>
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="56" y="56" width="688" height="488" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="80" y="100" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.5">SPECIMEN — PHRASE</text>
  <line x1="80" y1="115" x2="220" y2="115" stroke="#d97706" stroke-width="1.5"/>

  <text x="720" y="100" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">CAT. CIRCA 2018</text>

  <text x="400" y="265" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="82" fill="#d97706" text-anchor="middle" font-weight="400">Tick tock,</text>
  <text x="400" y="355" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="82" fill="#1a1a1a" text-anchor="middle" font-weight="400">next block.</text>

  <line x1="320" y1="405" x2="480" y2="405" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="450" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">The clock that does not stop.</text>
  <text x="400" y="470" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">Ten minutes, on average, since 2009.</text>

  <line x1="280" y1="505" x2="520" y2="505" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="530" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="middle">BRADY SWENSON, SWAN BITCOIN — CIRCA 2018</text>

  <text x="80" y="575" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5">BITCOIN ANNOTATED</text>
  <text x="720" y="575" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5" text-anchor="end">PLATE XIX</text>
