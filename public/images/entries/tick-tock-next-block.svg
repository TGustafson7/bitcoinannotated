<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid meet">
  <rect width="800" height="560" fill="#f8f4ed"/>

  <!-- top-left: type / subtitle, mono small-caps -->
  <text x="48" y="46" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">PHRASE — PROTOCOL RHYTHM</text>

  <!-- top-right: date, mono small-caps -->
  <text x="752" y="46" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">CIRCA 2018</text>

  <!-- top separator line -->
  <line x1="48" y1="68" x2="752" y2="68" stroke="#1a1a1a" stroke-width="0.5" opacity="0.5"/>

  <!-- main phrase, two lines, italic Garamond -->
  <!-- "Tick Tock" orange, "Next Block." black; centered on two lines -->
  <text x="400" y="262" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="86" font-style="italic" fill="#d97706" font-weight="400">Tick Tock</text>
  <text x="400" y="354" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="86" font-style="italic" fill="#1a1a1a" font-weight="400">Next Block.</text>

  <!-- supporting line, italic Garamond smaller -->
  <text x="400" y="418" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="17" font-style="italic" fill="#1a1a1a" opacity="0.85">The clock that does not stop. Ten minutes, on average, since 2009.</text>

  <!-- thin separator line above attribution -->
  <line x1="280" y1="450" x2="520" y2="450" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>

  <!-- attribution, mono small-caps -->
  <text x="400" y="474" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.2" font-weight="500" opacity="0.85">BITCOIN TWITTER — EARLIEST APPEARANCE UNSETTLED</text>

  <!-- bottom separator line -->
  <line x1="48" y1="508" x2="752" y2="508" stroke="#1a1a1a" stroke-width="0.5" opacity="0.5"/>

  <!-- bottom-left: BITCOIN ANNOTATED -->
  <text x="48" y="530" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">BITCOIN ANNOTATED</text>

  <!-- bottom-right: PLATE XIX -->
  <text x="752" y="530" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">PLATE XIX</text>
</svg>
