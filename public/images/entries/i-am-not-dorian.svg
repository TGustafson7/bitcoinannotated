<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <rect width="800" height="560" fill="#f8f4ed"/>

  <text x="80" y="60" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5">DOCUMENT — FORUM POST</text>
  <text x="720" y="60" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="end">7 MARCH 2014</text>

  <text x="400" y="220" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="44" fill="#d97706" text-anchor="middle" font-weight="500">I am not</text>
  <text x="400" y="275" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="44" fill="#1a1a1a" text-anchor="middle" font-weight="500">Dorian Nakamoto.</text>

  <line x1="320" y1="320" x2="480" y2="320" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="365" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">Five words. The first message in five years. The last</text>
  <text x="400" y="385" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">undisputed signal from the account that started it.</text>

  <line x1="280" y1="425" x2="520" y2="425" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="460" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="middle">POSTED BY: SATOSHI NAKAMOTO — P2P FOUNDATION (NING)</text>
  <text x="400" y="485" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="middle">CONTEXT: NEWSWEEK COVER STORY, SAME WEEK</text>

  <text x="80" y="530" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5">BITCOIN ANNOTATED</text>
  <text x="720" y="530" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5" text-anchor="end">PLATE XV</text>
</svg>
