<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f8f4ed"/>
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="56" y="56" width="688" height="488" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="80" y="100" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.5">SPECIMEN — ICONOGRAPHY</text>
  <line x1="80" y1="115" x2="240" y2="115" stroke="#d97706" stroke-width="1.5"/>

  <text x="720" y="100" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">CAT. DECEMBER 2011</text>

  <text x="400" y="265" text-anchor="middle" font-family="EB Garamond, Garamond, serif" font-size="86" fill="#d97706" font-weight="500" letter-spacing="14">VIRES</text>
  <text x="400" y="360" text-anchor="middle" font-family="EB Garamond, Garamond, serif" font-size="86" fill="#1a1a1a" font-weight="500" letter-spacing="14">IN NUMERIS</text>

  <text x="400" y="412" text-anchor="middle" font-family="EB Garamond, Garamond, serif" font-size="22" font-style="italic" fill="#1a1a1a" opacity="0.8">Strength in Numbers.</text>

  <line x1="320" y1="445" x2="480" y2="445" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="485" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">The Latin motto stamped on bitcoin’s first physical coins,</text>
  <text x="400" y="505" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">and on its unofficial heraldry since.</text>

  <line x1="280" y1="535" x2="520" y2="535" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="558" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="middle">CASASCIUS PHYSICAL BITCOINS — MIKE CALDWELL</text>

  <text x="80" y="585" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5">BITCOIN ANNOTATED</text>
  <text x="720" y="585" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5" text-anchor="end">PLATE XXII</text>
</svg>
