<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid meet">
  <rect width="800" height="560" fill="#f8f4ed"/>

  <!-- top-left: type / subtitle, mono small-caps -->
  <text x="48" y="46" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">ICONOGRAPHY — HERALDIC MOTTO</text>

  <!-- top-right: date, mono small-caps -->
  <text x="752" y="46" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">DECEMBER 2011</text>

  <!-- top separator line -->
  <line x1="48" y1="68" x2="752" y2="68" stroke="#1a1a1a" stroke-width="0.5" opacity="0.5"/>

  <!-- main: VIRES IN NUMERIS, set as engraved-coin lettering, two lines -->
  <!-- "VIRES" orange, "IN NUMERIS" black; small caps, generous letter-spacing -->
  <text x="400" y="248" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="86" fill="#d97706" font-weight="500" letter-spacing="14">VIRES</text>
  <text x="400" y="346" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="86" fill="#1a1a1a" font-weight="500" letter-spacing="14">IN NUMERIS</text>

  <!-- italic translation underneath -->
  <text x="400" y="402" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="22" font-style="italic" fill="#1a1a1a" opacity="0.75">Strength in Numbers.</text>

  <!-- supporting line, italic Garamond smaller -->
  <text x="400" y="442" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="15" font-style="italic" fill="#1a1a1a" opacity="0.75">The Latin motto stamped on bitcoin&#8217;s first physical coins, and on its unofficial heraldry since.</text>

  <!-- thin separator line above attribution -->
  <line x1="280" y1="466" x2="520" y2="466" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>

  <!-- attribution, mono small-caps -->
  <text x="400" y="488" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.2" font-weight="500" opacity="0.85">CASASCIUS PHYSICAL BITCOINS — MIKE CALDWELL</text>

  <!-- bottom separator line -->
  <line x1="48" y1="508" x2="752" y2="508" stroke="#1a1a1a" stroke-width="0.5" opacity="0.5"/>

  <!-- bottom-left: BITCOIN ANNOTATED -->
  <text x="48" y="530" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">BITCOIN ANNOTATED</text>

  <!-- bottom-right: PLATE XXII -->
  <text x="752" y="530" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">PLATE XXII</text>
</svg>
