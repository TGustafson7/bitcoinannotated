<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f8f4ed"/>
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="56" y="56" width="688" height="488" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="80" y="100" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.5">SPECIMEN — ICONOGRAPHY</text>
  <line x1="80" y1="115" x2="240" y2="115" stroke="#d97706" stroke-width="1.5"/>

  <text x="720" y="100" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">CAT. SEPTEMBER 2013</text>

  <g font-family="EB Garamond, Garamond, serif" font-style="italic" fill="#1a1a1a">
    <text x="100" y="225" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">1.</tspan>
      <tspan dx="10">abandon</tspan>
    </text>
    <text x="265" y="225" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">2.</tspan>
      <tspan dx="10">ability</tspan>
    </text>
    <text x="430" y="225" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">3.</tspan>
      <tspan dx="10">able</tspan>
    </text>
    <text x="595" y="225" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">4.</tspan>
      <tspan dx="10">about</tspan>
    </text>
  </g>

  <g font-family="EB Garamond, Garamond, serif" font-style="italic" fill="#1a1a1a">
    <text x="100" y="285" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">5.</tspan>
      <tspan dx="10">above</tspan>
    </text>
    <text x="265" y="285" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">6.</tspan>
      <tspan dx="10">absent</tspan>
    </text>
    <text x="430" y="285" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">7.</tspan>
      <tspan dx="10">absorb</tspan>
    </text>
    <text x="595" y="285" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">8.</tspan>
      <tspan dx="10">abstract</tspan>
    </text>
  </g>

  <g font-family="EB Garamond, Garamond, serif" font-style="italic" fill="#1a1a1a">
    <text x="100" y="345" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">9.</tspan>
      <tspan dx="10">absurd</tspan>
    </text>
    <text x="265" y="345" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">10.</tspan>
      <tspan dx="10">abuse</tspan>
    </text>
    <text x="430" y="345" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">11.</tspan>
      <tspan dx="10">access</tspan>
    </text>
    <text x="595" y="345" font-size="28">
      <tspan font-family="JetBrains Mono, monospace" font-style="normal" font-size="13" fill="#1a1a1a" opacity="0.5">12.</tspan>
      <tspan dx="10" fill="#d97706">accident</tspan>
    </text>
  </g>

  <line x1="280" y1="395" x2="520" y2="395" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="430" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">The first twelve words of the BIP-39 wordlist.</text>
  <text x="400" y="450" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">Two thousand and forty-eight in total.</text>

  <line x1="280" y1="485" x2="520" y2="485" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="510" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="middle">BIP-39 — PALATINUS, RUSNAK, VOISINE, BOWE — SEPTEMBER 10, 2013</text>

  <text x="80" y="555" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5">BITCOIN ANNOTATED</text>
  <text x="720" y="555" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5" text-anchor="end">PLATE XVIII</text>
</svg>
