<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid meet">
  <rect width="800" height="560" fill="#f8f4ed"/>

  <!-- top-left: type / subtitle, mono small-caps -->
  <text x="48" y="46" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">PHRASE — SAYLOR DOCTRINE</text>

  <!-- top-right: date, mono small-caps -->
  <text x="752" y="46" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">NOVEMBER 2021</text>

  <!-- top separator line -->
  <line x1="48" y1="68" x2="752" y2="68" stroke="#1a1a1a" stroke-width="0.5" opacity="0.5"/>

  <!-- main phrase, three lines, italic Garamond -->
  <!-- Line 1: "It's going up forever," — orange-led with black tail -->
  <text x="400" y="232" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="58" font-style="italic" fill="#d97706" font-weight="400">It&#8217;s going up forever,</text>
  <!-- Line 2: "Laura." — dropped vocative, black, slightly larger for emphasis -->
  <text x="400" y="312" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="64" font-style="italic" fill="#1a1a1a" font-weight="400">Laura.</text>
  <!-- Line 3: "Forever." — the benediction, black, italic -->
  <text x="400" y="388" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="58" font-style="italic" fill="#1a1a1a" font-weight="400">Forever.</text>

  <!-- supporting line, italic Garamond smaller -->
  <text x="400" y="436" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="16" font-style="italic" fill="#1a1a1a" opacity="0.85">The Saylor doctrine, delivered to a podcast and reissued through every cycle since.</text>

  <!-- thin separator line above attribution -->
  <line x1="280" y1="466" x2="520" y2="466" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>

  <!-- attribution, mono small-caps -->
  <text x="400" y="488" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.2" font-weight="500" opacity="0.85">MICHAEL SAYLOR — UNCHAINED PODCAST WITH LAURA SHIN</text>

  <!-- bottom separator line -->
  <line x1="48" y1="508" x2="752" y2="508" stroke="#1a1a1a" stroke-width="0.5" opacity="0.5"/>

  <!-- bottom-left: BITCOIN ANNOTATED -->
  <text x="48" y="530" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">BITCOIN ANNOTATED</text>

  <!-- bottom-right: PLATE XX -->
  <text x="752" y="530" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">PLATE XX</text>
</svg>
