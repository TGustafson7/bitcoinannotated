<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f8f4ed"/>
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="56" y="56" width="688" height="488" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="80" y="100" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.5">SPECIMEN — PHRASE</text>
  <line x1="80" y1="115" x2="220" y2="115" stroke="#d97706" stroke-width="1.5"/>

  <text x="720" y="100" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">CAT. MARCH 2014</text>

  <text x="400" y="270" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="64" fill="#1a1a1a" text-anchor="middle" font-weight="500"><tspan fill="#d97706">Hyper</tspan>bitcoinization.</text>

  <text x="400" y="325" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="22" fill="#1a1a1a" text-anchor="middle" opacity="0.8">Bitcoin-induced currency demonetization.</text>

  <line x1="320" y1="370" x2="480" y2="370" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="415" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">Daniel Krawisz’s 2014 essay gave bitcoiners a single word —</text>
  <text x="400" y="435" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">for the thesis underneath the asset.</text>

  <line x1="280" y1="475" x2="520" y2="475" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="505" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="middle">DANIEL KRAWISZ — SATOSHI NAKAMOTO INSTITUTE, MARCH 29, 2014</text>

  <text x="720" y="555" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5" text-anchor="end">bitcoinannotated.com</text>
</svg>
