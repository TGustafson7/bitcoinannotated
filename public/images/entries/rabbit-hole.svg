  <text x="400" y="490" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="middle">CRYSTALLIZED: GIGI, 21 LESSONS, DECEMBER 24, 2019</text>
  <text x="400" y="510" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="middle">USAGE: DURATION OF CONVICTION, NOT THE OUTCOME</text>

  <text x="720" y="555" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5" text-anchor="end">bitcoinannotated.com</text>
