<svg width="100%" viewBox="0 0 810 570" xmlns="http://www.w3.org/2000/svg" role="img" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Plate XXIV — The Cantillon Effect</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A cream paper plate with the phrase "The Cantillon Effect" in italic serif, with Cantillon in bitcoin orange. Museum-card style with small caps top and bottom corners.</desc>

<rect width="800" height="560" fill="#f8f4ed" style="fill:rgb(248, 244, 237);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<line x1="60" y1="80" x2="740" y2="80" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(58, 58, 58);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<text x="60" y="58" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="500" fill="#3a3a3a" letter-spacing="3" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:12px;font-weight:500;text-anchor:start;dominant-baseline:auto">PHRASE — BORROWED VOCABULARY</text>

<text x="740" y="58" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="500" fill="#3a3a3a" letter-spacing="3" text-anchor="end" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:12px;font-weight:500;text-anchor:end;dominant-baseline:auto">CANTILLON · 1755</text>

<text x="400" y="260" font-family="'EB Garamond', Georgia, serif" font-size="56" font-style="italic" fill="#1a1a1a" text-anchor="middle" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;EB Garamond&quot;, Georgia, serif;font-size:56px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">The <tspan fill="#d97706" style="fill:rgb(217, 119, 6);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;EB Garamond&quot;, Georgia, serif;font-size:56px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">Cantillon</tspan> Effect.</text>

<text x="400" y="320" font-family="'EB Garamond', Georgia, serif" font-size="20" font-style="italic" fill="#3a3a3a" text-anchor="middle" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;EB Garamond&quot;, Georgia, serif;font-size:20px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">New money does not enter the economy uniformly.</text>

<text x="400" y="350" font-family="'EB Garamond', Georgia, serif" font-size="20" font-style="italic" fill="#3a3a3a" text-anchor="middle" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;EB Garamond&quot;, Georgia, serif;font-size:20px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">It enters at specific points, and from those points it spreads.</text>

<line x1="350" y1="395" x2="450" y2="395" stroke="#d97706" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(217, 119, 6);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<text x="400" y="430" font-family="'EB Garamond', Georgia, serif" font-size="16" font-style="italic" fill="#3a3a3a" text-anchor="middle" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;EB Garamond&quot;, Georgia, serif;font-size:16px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">An eighteenth-century French observation, absorbed by bitcoiners</text>
<text x="400" y="453" font-family="'EB Garamond', Georgia, serif" font-size="16" font-style="italic" fill="#3a3a3a" text-anchor="middle" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;EB Garamond&quot;, Georgia, serif;font-size:16px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">as the explanation for everything they distrust.</text>

<line x1="60" y1="500" x2="740" y2="500" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(58, 58, 58);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<text x="60" y="525" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#3a3a3a" letter-spacing="2.5" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:11px;font-weight:500;text-anchor:start;dominant-baseline:auto">BITCOIN ANNOTATED</text>

<text x="740" y="525" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#3a3a3a" letter-spacing="2.5" text-anchor="end" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:11px;font-weight:500;text-anchor:end;dominant-baseline:auto">PLATE XXIV</text>

</svg>