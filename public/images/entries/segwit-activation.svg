<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid meet">
  <rect width="800" height="560" fill="#f8f4ed"/>

  <!-- top-left: type / subtitle, mono small-caps -->
  <text x="48" y="46" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">EVENT — PROTOCOL UPGRADE</text>

  <!-- top-right: date, mono small-caps -->
  <text x="752" y="46" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">AUGUST 24, 2017</text>

  <!-- top separator line -->
  <line x1="48" y1="68" x2="752" y2="68" stroke="#1a1a1a" stroke-width="0.5" opacity="0.5"/>

  <!-- main: BLOCK number, large mono in orange -->
  <text x="400" y="208" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="20" fill="#1a1a1a" letter-spacing="3.5" font-weight="500" opacity="0.7">BLOCK</text>
  <text x="400" y="312" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="98" fill="#d97706" font-weight="700" letter-spacing="3">481,824</text>

  <!-- italic Garamond title underneath -->
  <text x="400" y="378" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="40" font-style="italic" fill="#1a1a1a" font-weight="400">SegWit Activation.</text>

  <!-- supporting line, italic Garamond smaller -->
  <text x="400" y="426" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="16" font-style="italic" fill="#1a1a1a" opacity="0.85">The peace treaty that ended the Block Size Wars and unlocked the second layer.</text>

  <!-- thin separator line above attribution -->
  <line x1="280" y1="456" x2="520" y2="456" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>

  <!-- attribution, mono small-caps -->
  <text x="400" y="478" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.2" font-weight="500" opacity="0.85">BIP-141 — WUILLE &amp; MAXWELL — MINED BY BTC.COM</text>

  <!-- bottom separator line -->
  <line x1="48" y1="508" x2="752" y2="508" stroke="#1a1a1a" stroke-width="0.5" opacity="0.5"/>

  <!-- bottom-left: BITCOIN ANNOTATED -->
  <text x="48" y="530" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">BITCOIN ANNOTATED</text>

  <!-- bottom-right: PLATE XXI -->
  <text x="752" y="530" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#1a1a1a" letter-spacing="2.4" font-weight="500">PLATE XXI</text>
</svg>
