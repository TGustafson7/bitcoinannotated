<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f8f4ed"/>
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="56" y="56" width="688" height="488" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="80" y="100" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2.5">SPECIMEN — PHRASE</text>
  <line x1="80" y1="115" x2="220" y2="115" stroke="#d97706" stroke-width="1.5"/>

  <text x="720" y="100" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">CAT. FEBRUARY 2019</text>

  <text x="400" y="335" font-family="JetBrains Mono, monospace" font-size="76" fill="#1a1a1a" text-anchor="middle" font-weight="700" letter-spacing="3">1 BTC <tspan fill="#d97706">=</tspan> 1 BTC</text>

  <line x1="320" y1="395" x2="480" y2="395" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="440" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">Pierre Rochard’s February 2019 chart with a perfectly horizontal line —</text>
  <text x="400" y="460" font-family="EB Garamond, Garamond, serif" font-style="italic" font-size="14" fill="#1a1a1a" text-anchor="middle">the phrase tells you which side of the chart the speaker is standing on.</text>

  <line x1="280" y1="495" x2="520" y2="495" stroke="#1a1a1a" stroke-width="0.5"/>

  <text x="400" y="520" font-family="JetBrains Mono, monospace" font-size="10" fill="#1a1a1a" letter-spacing="1.5" text-anchor="middle">PIERRE ROCHARD — TWITTER, FEBRUARY 23, 2019</text>

  <text x="720" y="570" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a1a1a" letter-spacing="1.5" text-anchor="end">bitcoinannotated.com</text>
