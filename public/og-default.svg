<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f8f4ed"/>

  <!-- Outer ledger frame, like the entry plates -->
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="68" y="68" width="1064" height="494" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Top corner marks (left and right) -->
  <text x="100" y="118" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="3" fill="#1a1a1a">SPECIMEN — REFERENCE</text>
  <line x1="100" y1="134" x2="305" y2="134" stroke="#d97706" stroke-width="1.5"/>

  <text x="1100" y="118" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="3" fill="#1a1a1a">CAT. ARCHIVE</text>

  <!-- Center wordmark: large serif, italic accent, orange -->
  <text x="600" y="305" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="92" font-weight="500" fill="#1a1a1a">The Bitcoin</text>
  <text x="600" y="408" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-style="italic" font-size="92" font-weight="400" fill="#d97706">Annotated</text>

  <!-- Hairline separator below wordmark -->
  <line x1="430" y1="450" x2="770" y2="450" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Tagline, mono small-caps -->
  <text x="600" y="488" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="4" fill="#6b6358">A REFERENCE WORK FOR BITCOIN'S CULTURAL ARTIFACTS</text>

  <!-- Bottom corners -->
  <text x="100" y="552" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="2" fill="#6b6358">BITCOINANNOTATED.COM</text>
  <text x="1100" y="552" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="2" fill="#6b6358">EDITION 1 · 2026</text>
</svg>
